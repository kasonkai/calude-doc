<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暖色番茄钟</title>
    <style>
        :root {
            --bg-start: #FFF5EC;
            --bg-end: #FFDDC4;
            --card-bg: #FFFBF7;
            --timer-bg: #FFE8D6;
            --primary: #E8784A;
            --primary-hover: #D0653A;
            --accent: #F4A460;
            --text: #5C3D2E;
            --text-light: #8B6F5E;
            --shadow: rgba(180, 120, 80, 0.18);
            --border: #E8D0BA;
            --break-color: #7DB88C;
            --dot-empty: #E8D0BA;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(150deg, #FFF5EC 0%, #FFE8D6 40%, #FFDDC4 80%, #FFD8BC 100%);
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 36px 32px 28px;
            box-shadow: 0 16px 48px var(--shadow), 0 2px 8px rgba(160, 100, 60, 0.08);
            text-align: center;
            max-width: 440px;
            width: 100%;
        }

        h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
            letter-spacing: 0.06em;
        }

        .subtitle {
            font-size: 0.82rem;
            color: var(--accent);
            margin-bottom: 22px;
            font-weight: 500;
        }

        .mode-tabs {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 20px;
            background: #FFF0E5;
            border-radius: 24px;
            padding: 4px;
        }

        .mode-tab {
            flex: 1;
            padding: 8px 12px;
            border-radius: 22px;
            border: none;
            background: transparent;
            color: var(--text-light);
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .mode-tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(232, 120, 74, 0.3);
        }

        .timer-display {
            background: var(--timer-bg);
            border-radius: 50%;
            width: 210px;
            height: 210px;
            margin: 0 auto 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 6px solid var(--primary);
            transition: border-color 0.5s, background 0.5s;
            position: relative;
            cursor: default;
        }

        .timer-display.break-mode {
            border-color: var(--break-color);
            background: #E8F5E0;
        }

        .timer-display.paused {
            animation: pulse-border 2s ease-in-out infinite;
        }

        @keyframes pulse-border {
            0%, 100% { border-color: var(--primary); }
            50% { border-color: var(--accent); }
        }

        .timer-display.break-mode.paused {
            animation: pulse-border-break 2s ease-in-out infinite;
        }

        @keyframes pulse-border-break {
            0%, 100% { border-color: var(--break-color); }
            50% { border-color: #A8D5B0; }
        }

        .time {
            font-size: 3.2rem;
            font-weight: 700;
            color: var(--text);
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.05em;
            line-height: 1;
        }

        .session-label {
            font-size: 0.8rem;
            color: var(--primary);
            font-weight: 600;
            margin-top: 4px;
            transition: color 0.5s;
        }

        .break-mode .session-label { color: var(--break-color); }

        .session-dots {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 18px;
        }

        .session-dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: var(--dot-empty);
            transition: all 0.4s;
        }

        .session-dot.completed { background: var(--primary); transform: scale(1.1); }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 22px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            padding: 11px 26px;
            border-radius: 28px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            letter-spacing: 0.03em;
            font-family: inherit;
        }

        button:active { transform: scale(0.96); }

        .btn-start {
            background: var(--primary);
            color: white;
            min-width: 100px;
        }

        .btn-start:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(232, 120, 74, 0.35);
        }

        .btn-reset {
            background: white;
            color: var(--text);
            border: 2px solid var(--border);
            min-width: 90px;
        }

        .btn-reset:hover {
            background: #FFF3EA;
            transform: translateY(-2px);
        }

        .image-window {
            width: 100%;
            height: 170px;
            border-radius: 18px;
            overflow: hidden;
            position: relative;
            background: #F5E8DA;
            box-shadow: inset 0 1px 6px rgba(0, 0, 0, 0.04);
            margin-top: 4px;
        }

        .image-window img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 1s ease-in-out;
            position: absolute;
            top: 0;
            left: 0;
        }

        .image-label {
            position: absolute;
            bottom: 10px;
            right: 14px;
            background: rgba(60, 30, 10, 0.45);
            color: #fff;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.68rem;
            backdrop-filter: blur(6px);
            z-index: 2;
            letter-spacing: 0.04em;
        }

        @media (max-width: 460px) {
            .container { padding: 24px 18px 20px; }
            .timer-display { width: 170px; height: 170px; }
            .time { font-size: 2.6rem; }
            .mode-tab { font-size: 0.7rem; padding: 6px 8px; }
            button { padding: 10px 18px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>暖色番茄钟</h1>
    <p class="subtitle">专注工作 · 适时休息</p>

    <div class="mode-tabs" id="modeTabs">
        <button class="mode-tab active" data-mode="work">专注 25 分钟</button>
        <button class="mode-tab" data-mode="shortBreak">小休 5 分钟</button>
        <button class="mode-tab" data-mode="longBreak">长休 15 分钟</button>
    </div>

    <div class="timer-display" id="timerDisplay">
        <span class="time" id="timeDisplay">25:00</span>
        <span class="session-label" id="sessionLabel">专注</span>
    </div>

    <div class="session-dots" id="sessionDots">
        <span class="session-dot"></span>
        <span class="session-dot"></span>
        <span class="session-dot"></span>
        <span class="session-dot"></span>
    </div>

    <div class="controls">
        <button class="btn-start" id="btnStart">开始计时</button>
        <button class="btn-reset" id="btnReset">重置</button>
    </div>

    <div class="image-window" id="imageWindow">
        <img id="imgFront" src="" alt="风景">
        <img id="imgBack" src="" alt="" style="opacity:0;">
        <span class="image-label">风景画廊</span>
    </div>
</div>

<script>
(function () {
    const MODES = {
        work: { label: '专注', minutes: 25, color: 'work' },
        shortBreak: { label: '小休', minutes: 5, color: 'break' },
        longBreak: { label: '长休', minutes: 15, color: 'break' },
    };

    const timeDisplay = document.getElementById('timeDisplay');
    const sessionLabel = document.getElementById('sessionLabel');
    const timerDisplay = document.getElementById('timerDisplay');
    const btnStart = document.getElementById('btnStart');
    const btnReset = document.getElementById('btnReset');
    const modeTabs = document.getElementById('modeTabs');
    const sessionDots = document.getElementById('sessionDots');
    const imgFront = document.getElementById('imgFront');
    const imgBack = document.getElementById('imgBack');
    const imageWindow = document.getElementById('imageWindow');

    let currentMode = 'work';
    let totalSeconds = MODES.work.minutes * 60;
    let remainingSeconds = totalSeconds;
    let timerInterval = null;
    let isRunning = false;
    let completedSessions = 0;
    let imageIdx = 0;
    let imageTimer = null;
    let showingFront = true;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playChime() {
        const notes = [523.25, 659.25, 783.99, 1046.5];
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime + i * 0.15);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.15 + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + i * 0.15);
            osc.stop(audioCtx.currentTime + i * 0.15 + 0.5);
        });
    }

    function playAlert() {
        [800, 1000, 800].forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.2);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.2 + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + i * 0.2);
            osc.stop(audioCtx.currentTime + i * 0.2 + 0.3);
        });
    }

    function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = s % 60;
        return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
    }

    function updateDisplay() {
        timeDisplay.textContent = formatTime(remainingSeconds);
        document.title = formatTime(remainingSeconds) + ' - 暖色番茄钟';
    }

    function switchModeUI(mode) {
        const m = MODES[mode];
        sessionLabel.textContent = m.label;
        if (m.color === 'break') {
            timerDisplay.classList.add('break-mode');
        } else {
            timerDisplay.classList.remove('break-mode');
        }
    }

    function setMode(mode) {
        currentMode = mode;
        totalSeconds = MODES[mode].minutes * 60;
        remainingSeconds = totalSeconds;
        switchModeUI(mode);
        updateDisplay();

        modeTabs.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
        modeTabs.querySelector(`[data-mode="${mode}"]`).classList.add('active');

        if (isRunning) {
            pause();
        }
    }

    function updateDots() {
        const dots = sessionDots.querySelectorAll('.session-dot');
        dots.forEach((dot, i) => {
            if (i < completedSessions) {
                dot.classList.add('completed');
            } else {
                dot.classList.remove('completed');
            }
        });
    }

    function start() {
        if (isRunning) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();

        isRunning = true;
        timerDisplay.classList.add('paused');
        btnStart.textContent = '暂停';

        timerInterval = setInterval(() => {
            remainingSeconds--;
            updateDisplay();

            if (remainingSeconds <= 0) {
                clearInterval(timerInterval);
                isRunning = false;
                timerDisplay.classList.remove('paused');
                btnStart.textContent = '开始计时';
                playAlert();

                if (currentMode === 'work') {
                    completedSessions = Math.min(completedSessions + 1, 4);
                    updateDots();
                    if (completedSessions >= 4) {
                        setMode('longBreak');
                        completedSessions = 0;
                        updateDots();
                    } else {
                        setMode('shortBreak');
                    }
                    start();
                } else {
                    setMode('work');
                }
            }
        }, 1000);
    }

    function pause() {
        if (!isRunning) return;
        clearInterval(timerInterval);
        isRunning = false;
        timerDisplay.classList.remove('paused');
        btnStart.textContent = '继续计时';
    }

    function reset() {
        clearInterval(timerInterval);
        isRunning = false;
        timerDisplay.classList.remove('paused');
        btnStart.textContent = '开始计时';
        remainingSeconds = totalSeconds;
        updateDisplay();
    }

    btnStart.addEventListener('click', () => {
        if (isRunning) {
            pause();
        } else {
            start();
        }
    });

    btnReset.addEventListener('click', reset);

    modeTabs.addEventListener('click', (e) => {
        const tab = e.target.closest('.mode-tab');
        if (!tab) return;
        setMode(tab.dataset.mode);
    });

    function loadImage(url, imgEl) {
        return new Promise((resolve) => {
            imgEl.onload = () => resolve();
            imgEl.onerror = () => resolve();
            imgEl.src = url;
        });
    }

    function getNextImageUrl() {
        imageIdx++;
        return `https://picsum.photos/seed/nature${imageIdx}/800/400`;
    }

    async function cycleImage() {
        const nextUrl = getNextImageUrl();
        const target = showingFront ? imgBack : imgFront;
        const current = showingFront ? imgFront : imgBack;

        await loadImage(nextUrl, target);

        target.style.opacity = '1';
        current.style.opacity = '0';
        showingFront = !showingFront;
    }

    function startImageCycle() {
        loadImage(getNextImageUrl(), imgFront).then(() => {
            imgFront.style.opacity = '1';
        });

        imageTimer = setInterval(cycleImage, 8000);
    }

    function stopImageCycle() {
        clearInterval(imageTimer);
    }

    setMode('work');
    updateDots();
    startImageCycle();

    window.addEventListener('beforeunload', () => {
        stopImageCycle();
        clearInterval(timerInterval);
    });
})();
</script>

</body>
</html>
